# gcovr configuration — keeps regex filters (which contain shell
# metacharacters) out of the CMake-generated command line.
#
# Coverage is measured only for the production libraries; the legacy
# demo/driver harness under src/Testing and the apps/ drivers are excluded.
# Paths are relative to this config file's directory (the project root).
filter = src/Stack/
filter = src/FibHeap/
filter = src/Graph/
